<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX-BOT — Deals Luxembourg</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { transition: transform 0.15s, box-shadow 0.15s; }
        .card:hover { transform: translateY(-3px); }
        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .deal-hot    { border-left: 4px solid #ef4444; }
        .deal-good   { border-left: 4px solid #f97316; }
        .deal-normal { border-left: 4px solid #3b82f6; }
        .deal-plain  { border-left: 4px solid #e5e7eb; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="bg-gradient-to-r from-blue-600 to-blue-800 text-white shadow-lg">
        <div class="container mx-auto px-4 py-5 flex items-center justify-between">
            <div>
                <a href="index.html" class="text-blue-200 text-sm hover:underline">← LUX-BOT</a>
                <h1 class="text-2xl font-bold mt-1">🏷️ Deals Luxembourg</h1>
                <p class="text-blue-100 text-sm">Promotions &amp; soldes — Luxemburg</p>
            </div>
            <nav class="flex gap-4 text-sm font-medium">
                <a href="activites.html" class="text-white hover:text-blue-200">🎭 Activités</a>
                <a href="stats.html" class="text-white hover:text-blue-200">📊 Stats</a>
            </nav>
        </div>
    </header>

    <div class="container mx-auto px-4 py-6">

        <!-- Stats rapides -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6" id="deal-stats"></div>

        <!-- Filtres -->
        <div class="bg-white rounded-xl shadow p-4 mb-4 flex flex-wrap gap-3 items-center">
            <input id="search" type="text" placeholder="Rechercher un produit..."
                class="flex-1 min-w-48 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400"
                oninput="applyFilter()">
            <select id="filter-store" class="border border-gray-200 rounded-lg px-3 py-2 text-sm" onchange="applyFilter()">
                <option value="">Toutes enseignes</option>
            </select>
            <select id="filter-cat" class="border border-gray-200 rounded-lg px-3 py-2 text-sm" onchange="applyFilter()">
                <option value="">Toutes catégories</option>
            </select>
            <select id="sort" class="border border-gray-200 rounded-lg px-3 py-2 text-sm" onchange="applyFilter()">
                <option value="score">🔥 Meilleurs deals</option>
                <option value="recent">🕐 Plus récents</option>
                <option value="discount">% Réduction ↓</option>
                <option value="price-asc">Prix ↑</option>
                <option value="price-desc">Prix ↓</option>
                <option value="saving">💰 Économie ↓</option>
            </select>
            <span id="count" class="text-sm text-gray-400 whitespace-nowrap"></span>
        </div>

        <!-- Filtres rapides par type de deal -->
        <div class="flex flex-wrap gap-2 mb-4">
            <button onclick="setDealType('all')" id="type-all"
                class="type-btn px-4 py-2 rounded-lg text-sm font-semibold bg-blue-600 text-white">
                Tous
            </button>
            <button onclick="setDealType('hot')" id="type-hot"
                class="type-btn px-4 py-2 rounded-lg text-sm font-semibold bg-white text-gray-600 border hover:bg-red-50">
                🔥 Chauds (&gt;30%)
            </button>
            <button onclick="setDealType('promo')" id="type-promo"
                class="type-btn px-4 py-2 rounded-lg text-sm font-semibold bg-white text-gray-600 border hover:bg-orange-50">
                🏷️ Vraies promos
            </button>
            <button onclick="setDealType('new')" id="type-new"
                class="type-btn px-4 py-2 rounded-lg text-sm font-semibold bg-white text-gray-600 border hover:bg-green-50">
                ⚡ Nouveaux &lt;24h
            </button>
        </div>

        <!-- Source badges -->
        <div id="source-badges" class="flex flex-wrap gap-2 mb-4"></div>

        <!-- Liste deals -->
        <div id="deals-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <div class="col-span-full text-center py-20 text-gray-300">Chargement...</div>
        </div>
    </div>

    <footer class="mt-12 py-6 text-center text-gray-400 text-sm">
        LUX-BOT — <span id="footer-update"></span>
    </footer>

    <script>
    let all = [];
    let dealType = 'all';

    // Score de deal : 0-100 selon remise, économie, ancienneté
    function dealScore(d) {
        let score = 0;
        const pct = d.discount_percent || 0;
        const saving = (d.old_price && d.price) ? (d.old_price - d.price) : 0;
        const ageMin = d.scraped_at ? Math.floor((Date.now() - new Date(d.scraped_at)) / 60000) : 9999;

        // Remise % : 40 pts max
        if (pct >= 50) score += 40;
        else if (pct >= 30) score += 30;
        else if (pct >= 15) score += 20;
        else if (pct >= 5)  score += 10;

        // Économie en € : 30 pts max
        if (saving >= 100) score += 30;
        else if (saving >= 50) score += 22;
        else if (saving >= 20) score += 15;
        else if (saving >= 5)  score += 8;
        else if (saving > 0)   score += 3;

        // Prix affiché (promo confirmée si old_price présent) : 20 pts
        if (d.old_price && d.price) score += 20;
        else if (pct > 0)           score += 10;

        // Fraîcheur : 10 pts max
        if (ageMin < 60)   score += 10;
        else if (ageMin < 360)  score += 7;
        else if (ageMin < 1440) score += 4;

        return score;
    }

    function dealClass(score) {
        if (score >= 70) return 'deal-hot';
        if (score >= 45) return 'deal-good';
        if (score >= 20) return 'deal-normal';
        return 'deal-plain';
    }

    function dealLabel(d) {
        const score = dealScore(d);
        const pct = d.discount_percent || 0;
        if (score >= 70 || pct >= 30) return { icon: '🔥', label: 'Très bon deal', cls: 'bg-red-100 text-red-700' };
        if (score >= 45 || pct >= 15) return { icon: '⚡', label: 'Bon deal',      cls: 'bg-orange-100 text-orange-700' };
        if (d.old_price && d.price)   return { icon: '🏷️', label: 'En promo',      cls: 'bg-blue-100 text-blue-700' };
        return null;
    }

    async function loadData() {
        try {
            const [deals, stats] = await Promise.all([
                fetch('data/deals.json').then(r => { if (!r.ok) throw new Error('deals.json ' + r.status); return r.json(); }),
                fetch('data/stats.json').then(r => { if (!r.ok) throw new Error('stats.json ' + r.status); return r.json(); })
            ]);
            all = deals;

            // Footer
            const upd = new Date(stats.last_update);
            document.getElementById('footer-update').textContent =
                'Mis à jour le ' + upd.toLocaleDateString('fr-FR') + ' à ' +
                upd.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});

            // Stats rapides — classes Tailwind statiques (pas de classes dynamiques)
            const hot      = deals.filter(x => (x.discount_percent||0) >= 30);
            const withSaving = deals.filter(x => x.old_price && x.price);
            const fresh    = deals.filter(x => x.scraped_at && (Date.now() - new Date(x.scraped_at)) < 86400000);
            document.getElementById('deal-stats').innerHTML = `
                <div class="bg-white rounded-xl shadow p-4">
                    <div class="text-gray-400 text-xs font-semibold uppercase">🏷️ Total deals</div>
                    <div class="text-2xl font-bold text-blue-600 mt-1">${deals.length}</div>
                </div>
                <div class="bg-white rounded-xl shadow p-4">
                    <div class="text-gray-400 text-xs font-semibold uppercase">🔥 Chauds (+30%)</div>
                    <div class="text-2xl font-bold text-red-600 mt-1">${hot.length}</div>
                </div>
                <div class="bg-white rounded-xl shadow p-4">
                    <div class="text-gray-400 text-xs font-semibold uppercase">💰 Avec promo prix</div>
                    <div class="text-2xl font-bold text-orange-500 mt-1">${withSaving.length}</div>
                </div>
                <div class="bg-white rounded-xl shadow p-4">
                    <div class="text-gray-400 text-xs font-semibold uppercase">⚡ Dernières 24h</div>
                    <div class="text-2xl font-bold text-green-600 mt-1">${fresh.length}</div>
                </div>`;

            // Store filter
            const stores = [...new Set(deals.map(x => x.store).filter(Boolean))].sort();
            const sel = document.getElementById('filter-store');
            stores.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });

            // Category filter
            const cats = [...new Set(deals.map(x => x.category).filter(Boolean))].sort();
            const csel = document.getElementById('filter-cat');
            cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; csel.appendChild(o); });

            // Source badges
            const srcCounts = {};
            deals.forEach(x => { srcCounts[x.source] = (srcCounts[x.source]||0)+1; });
            const badgesEl = document.getElementById('source-badges');
            badgesEl.innerHTML = '';
            Object.entries(srcCounts).sort((a,b) => b[1]-a[1]).forEach(([src, cnt]) => {
                const span = document.createElement('span');
                span.className = 'badge bg-blue-100 text-blue-700 cursor-pointer hover:bg-blue-200';
                span.textContent = src + ' ';
                const b = document.createElement('b');
                b.textContent = cnt;
                span.appendChild(b);
                span.onclick = () => filterBySource(src);
                badgesEl.appendChild(span);
            });

            applyFilter();

        } catch(e) {
            console.error('Erreur chargement deals:', e);
            document.getElementById('deals-list').innerHTML =
                '<div class="col-span-full text-center py-20 text-red-400">⚠️ Erreur de chargement — ' + e.message + '</div>';
            document.getElementById('deal-stats').innerHTML =
                '<div class="col-span-full text-red-400 text-sm py-4">Données indisponibles</div>';
        }
    }

    function filterBySource(src) {
        document.getElementById('filter-store').value = src;
        applyFilter();
    }

    function setDealType(type) {
        dealType = type;
        document.querySelectorAll('.type-btn').forEach(b => {
            b.className = 'type-btn px-4 py-2 rounded-lg text-sm font-semibold bg-white text-gray-600 border hover:bg-gray-50';
        });
        const colors = { all:'bg-blue-600', hot:'bg-red-600', promo:'bg-orange-500', new:'bg-green-600' };
        document.getElementById(`type-${type}`).className =
            `type-btn px-4 py-2 rounded-lg text-sm font-semibold ${colors[type]} text-white`;
        applyFilter();
    }

    function applyFilter() {
        const q = document.getElementById('search').value.toLowerCase();
        const store = document.getElementById('filter-store').value;
        const cat = document.getElementById('filter-cat').value;
        const sort = document.getElementById('sort').value;

        let filtered = all.filter(d => {
            if (q && !d.title.toLowerCase().includes(q)) return false;
            if (store && d.store !== store && d.source !== store) return false;
            if (cat && d.category !== cat) return false;
            // Type filter
            if (dealType === 'hot')   return (d.discount_percent||0) >= 30;
            if (dealType === 'promo') return d.old_price && d.price;
            if (dealType === 'new') {
                if (!d.scraped_at) return false;
                return (Date.now() - new Date(d.scraped_at)) < 86400000;
            }
            return true;
        });

        // Tri
        if (sort === 'score')      filtered.sort((a,b) => dealScore(b) - dealScore(a));
        else if (sort === 'recent') filtered.sort((a,b) => b.id - a.id);
        else if (sort === 'discount') filtered.sort((a,b) => (b.discount_percent||0) - (a.discount_percent||0));
        else if (sort === 'price-asc') filtered.sort((a,b) => (a.price||999999) - (b.price||999999));
        else if (sort === 'price-desc') filtered.sort((a,b) => (b.price||0) - (a.price||0));
        else if (sort === 'saving') {
            filtered.sort((a,b) => {
                const sa = (a.old_price && a.price) ? (a.old_price - a.price) : 0;
                const sb = (b.old_price && b.price) ? (b.old_price - b.price) : 0;
                return sb - sa;
            });
        }

        document.getElementById('count').textContent = `${filtered.length} résultat(s)`;
        render(filtered);
    }

    function render(deals) {
        const c = document.getElementById('deals-list');
        if (!deals.length) {
            c.innerHTML = '<div class="col-span-full text-center py-20 text-gray-300">Aucun deal pour ces critères</div>';
            return;
        }
        const now = Date.now();
        c.innerHTML = deals.slice(0, 120).map(d => {
            const score  = dealScore(d);
            const cls    = dealClass(score);
            const label  = dealLabel(d);
            const saving = (d.old_price && d.price) ? Math.round(d.old_price - d.price) : 0;
            const isNew  = d.scraped_at && (now - new Date(d.scraped_at)) < 86400000;
            const pct    = d.discount_percent || 0;

            return `
            <div class="card bg-white border border-gray-100 rounded-xl shadow-sm hover:shadow-md overflow-hidden ${cls}">
                <div class="p-4">
                    <!-- Badges en haut -->
                    <div class="flex flex-wrap gap-1 mb-2">
                        ${label ? `<span class="badge ${label.cls}">${label.icon} ${label.label}</span>` : ''}
                        ${isNew ? '<span class="badge bg-green-100 text-green-700">⚡ Nouveau</span>' : ''}
                    </div>

                    <!-- Titre + remise % -->
                    <div class="flex justify-between items-start gap-2 mb-2">
                        <h3 class="font-semibold text-gray-800 text-sm line-clamp-2 flex-1">${esc(d.title)}</h3>
                        ${pct >= 30 ? `<span class="badge bg-red-500 text-white shrink-0 text-base px-2 py-1">-${pct}%</span>`
                          : pct > 0 ? `<span class="badge bg-red-100 text-red-600 shrink-0">-${pct}%</span>` : ''}
                    </div>

                    <!-- Bloc prix -->
                    ${d.price != null ? `
                    <div class="flex items-baseline gap-2 mb-1">
                        <span class="text-2xl font-bold text-blue-600">${d.price}€</span>
                        ${d.old_price ? `<span class="text-sm text-gray-400 line-through">${d.old_price}€</span>` : ''}
                    </div>
                    ${saving > 0 ? `<div class="text-xs font-semibold text-green-600 mb-2">💰 Vous économisez ${saving}€</div>` : '<div class="mb-2"></div>'}
                    ` : '<div class="mb-3"></div>'}

                    <!-- Enseigne + catégorie -->
                    <div class="flex flex-wrap gap-1 mb-3">
                        <span class="badge bg-blue-50 text-blue-700">${esc(d.store || d.source)}</span>
                        ${d.category ? `<span class="badge bg-gray-100 text-gray-500">${esc(d.category)}</span>` : ''}
                    </div>

                    ${d.valid_until ? `<div class="text-xs text-amber-600 mb-2">⏰ Jusqu'au ${esc(d.valid_until)}</div>` : ''}

                    <a href="${esc(d.url)}" target="_blank" rel="noopener"
                       class="block w-full text-center bg-blue-600 text-white px-3 py-2 rounded-lg hover:bg-blue-700 text-sm font-semibold">
                        Voir l'offre →
                    </a>
                    <div class="text-xs text-gray-400 mt-2">${timeAgo(d.scraped_at)}</div>
                </div>
            </div>`;
        }).join('');
    }

    function esc(s) {
        if (!s && s !== 0) return '';
        const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML;
    }
    function timeAgo(dt) {
        if (!dt) return '';
        const diff = Math.floor((Date.now() - new Date(dt)) / 60000);
        if (diff < 60) return `Il y a ${diff} min`;
        if (diff < 1440) return `Il y a ${Math.floor(diff/60)}h`;
        return `Il y a ${Math.floor(diff/1440)}j`;
    }

    loadData();
    </script>
</body>
</html>
