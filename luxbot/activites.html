<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX-BOT — Activités 13-17 ans Luxembourg</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { transition: transform 0.15s; }
        .card:hover { transform: translateY(-3px); }
        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="bg-gradient-to-r from-purple-600 to-purple-800 text-white shadow-lg">
        <div class="container mx-auto px-4 py-5 flex items-center justify-between">
            <div>
                <a href="index.html" class="text-purple-200 text-sm hover:underline">← LUX-BOT</a>
                <h1 class="text-2xl font-bold mt-1">🎭 Activités 13-17 ans</h1>
                <p class="text-purple-200 text-sm">Communes Mamer, Bertrange &amp; Luxembourg</p>
            </div>
            <nav class="flex gap-4 text-sm font-medium">
                <a href="deals.html" class="text-white hover:text-purple-200">🏷️ Deals</a>
                <a href="stats.html" class="text-white hover:text-purple-200">📊 Stats</a>
            </nav>
        </div>
    </header>

    <div class="container mx-auto px-4 py-6">

        <!-- Filtres -->
        <div class="bg-white rounded-xl shadow p-4 mb-6 flex flex-wrap gap-3 items-center">
            <input id="search" type="text" placeholder="Rechercher une activité..."
                class="flex-1 min-w-48 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-400"
                oninput="applyFilter()">
            <select id="filter-location" class="border border-gray-200 rounded-lg px-3 py-2 text-sm" onchange="applyFilter()">
                <option value="">Toutes communes</option>
            </select>
            <select id="filter-source" class="border border-gray-200 rounded-lg px-3 py-2 text-sm" onchange="applyFilter()">
                <option value="">Toutes sources</option>
            </select>
            <select id="filter-price" class="border border-gray-200 rounded-lg px-3 py-2 text-sm" onchange="applyFilter()">
                <option value="">Tous prix</option>
                <option value="free">Gratuit</option>
                <option value="paid">Payant</option>
            </select>
            <span id="count" class="text-sm text-gray-400 whitespace-nowrap"></span>
        </div>

        <!-- Sources résumé -->
        <div id="source-badges" class="flex flex-wrap gap-2 mb-4"></div>

        <!-- Liste activités -->
        <div id="activites-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="col-span-full text-center py-20 text-gray-300">Chargement...</div>
        </div>
    </div>

    <footer class="mt-12 py-6 text-center text-gray-400 text-sm">
        LUX-BOT — <span id="footer-update"></span>
    </footer>

    <script>
    let all = [];

    async function loadData() {
        const [activites, stats] = await Promise.all([
            fetch('data/activites.json').then(r => r.json()),
            fetch('data/stats.json').then(r => r.json())
        ]);
        all = activites;

        // Footer
        const d = new Date(stats.last_update);
        document.getElementById('footer-update').textContent =
            'Mis à jour le ' + d.toLocaleDateString('fr-FR') + ' à ' +
            d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});

        // Location filter
        const locs = [...new Set(activites.map(a => a.location).filter(Boolean))].sort();
        const lsel = document.getElementById('filter-location');
        locs.forEach(l => { const o = document.createElement('option'); o.value = l; o.textContent = l; lsel.appendChild(o); });

        // Source filter
        const sources = [...new Set(activites.map(a => a.source).filter(Boolean))].sort();
        const ssel = document.getElementById('filter-source');
        sources.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; ssel.appendChild(o); });

        // Source summary
        const srcCounts = {};
        activites.forEach(a => { srcCounts[a.source] = (srcCounts[a.source]||0)+1; });
        document.getElementById('source-badges').innerHTML = Object.entries(srcCounts)
            .sort((a,b) => b[1]-a[1])
            .map(([src, cnt]) => `<span class="badge bg-purple-100 text-purple-700">${esc(src)} <b>${cnt}</b></span>`)
            .join('');

        applyFilter();
    }

    function applyFilter() {
        const q = document.getElementById('search').value.toLowerCase();
        const loc = document.getElementById('filter-location').value;
        const src = document.getElementById('filter-source').value;
        const price = document.getElementById('filter-price').value;

        let filtered = all.filter(a =>
            (!q || a.title.toLowerCase().includes(q) || (a.description||'').toLowerCase().includes(q)) &&
            (!loc || a.location === loc) &&
            (!src || a.source === src) &&
            (!price || (price==='free' ? a.price === 0 : a.price !== null && a.price > 0))
        );

        // Sort: by date_event if available, else by id
        filtered.sort((a, b) => {
            if (a.date_event && b.date_event) return a.date_event.localeCompare(b.date_event);
            return b.id - a.id;
        });

        document.getElementById('count').textContent = `${filtered.length} résultat(s)`;
        render(filtered);
    }

    const SOURCE_COLORS = {
        'activites.mamer.lu': 'bg-green-100 text-green-700',
        'mamer.lu/agenda': 'bg-green-50 text-green-600',
        'snj.lu': 'bg-blue-100 text-blue-700',
        'bertrange.lu': 'bg-orange-100 text-orange-700',
        'vdl.lu': 'bg-red-100 text-red-700',
    };

    function render(acts) {
        const c = document.getElementById('activites-list');
        if (!acts.length) {
            c.innerHTML = '<div class="col-span-full text-center py-20 text-gray-300">Aucune activité pour ces critères</div>';
            return;
        }
        c.innerHTML = acts.slice(0,80).map(a => {
            const srcColor = SOURCE_COLORS[a.source] || 'bg-purple-100 text-purple-700';
            return `
            <div class="card bg-white border border-gray-100 rounded-xl shadow-sm hover:shadow-md p-4">
                <div class="flex items-start justify-between gap-2 mb-2">
                    <h3 class="font-semibold text-gray-800 text-sm line-clamp-2 flex-1">${esc(a.title)}</h3>
                    ${a.price === 0 ? '<span class="badge bg-green-100 text-green-700 shrink-0">Gratuit</span>' :
                      a.price ? `<span class="badge bg-amber-100 text-amber-700 shrink-0">${a.price}€</span>` : ''}
                </div>
                ${a.description ? `<p class="text-xs text-gray-500 mb-3 line-clamp-3">${esc(a.description)}</p>` : ''}
                <div class="space-y-1 text-xs text-gray-600 mb-3">
                    ${a.date_event ? `<div>📅 ${esc(a.date_event)}</div>` : ''}
                    ${a.location ? `<div>📍 ${esc(a.location)}</div>` : ''}
                    ${a.age_min && a.age_max ? `<div>👥 ${a.age_min}-${a.age_max} ans</div>` : ''}
                    ${a.organizer ? `<div>🎪 ${esc(a.organizer)}</div>` : ''}
                </div>
                <div class="flex flex-wrap gap-1 mb-3">
                    <span class="badge ${srcColor}">${esc(a.source)}</span>
                </div>
                <a href="${esc(a.url)}" target="_blank" rel="noopener"
                   class="block w-full text-center bg-purple-600 text-white px-3 py-2 rounded-lg hover:bg-purple-700 text-sm font-semibold">
                    Plus d'infos →
                </a>
                <div class="text-xs text-gray-400 mt-2">${timeAgo(a.scraped_at)}</div>
            </div>`;
        }).join('');
    }

    function esc(s) {
        if (!s && s !== 0) return '';
        const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML;
    }
    function timeAgo(dt) {
        if (!dt) return '';
        const diff = Math.floor((Date.now() - new Date(dt)) / 60000);
        if (diff < 60) return `Il y a ${diff} min`;
        if (diff < 1440) return `Il y a ${Math.floor(diff/60)}h`;
        return `Il y a ${Math.floor(diff/1440)}j`;
    }

    loadData();
    </script>
</body>
</html>
