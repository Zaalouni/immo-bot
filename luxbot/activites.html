<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUX-BOT — Activités 13-17 ans Luxembourg</title>
  <meta name="theme-color" content="#f59e0b">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="index.html">⚡ LUX-BOT</a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">🏠 <span class="label">Accueil</span></a>
    <a class="nav-link" href="deals.html">🏷️ <span class="label">Deals</span></a>
    <a class="nav-link active" href="activites.html">🎭 <span class="label">Activités</span></a>
    <a class="nav-link" href="stats.html">📊 <span class="label">Stats</span></a>
  </div>
</nav>

<div class="container page-body">
  <div class="hero">
    <h1>🎭 <span class="hi">Activités</span> jeunesse</h1>
    <p>Événements 13-17 ans — Mamer · Bertrange · Luxembourg · Esch</p>
  </div>

  <!-- Stat bar -->
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:2rem">
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" style="color:#a78bfa" id="st-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Cette semaine</div><div class="stat-value text-accent" id="st-week">—</div></div>
    <div class="stat-card"><div class="stat-label">Gratuits</div><div class="stat-value" style="color:#4ade80" id="st-free">—</div></div>
    <div class="stat-card"><div class="stat-label">Sources</div><div class="stat-value" style="color:#7dd3fc" id="st-src">—</div></div>
  </div>

  <div id="error-msg" style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:0.75rem;padding:1rem;margin-bottom:1.5rem;color:#fca5a5;font-size:0.875rem;"></div>

  <!-- Source tabs -->
  <div class="tabs" id="source-tabs" style="background:var(--surface);border-radius:0.875rem 0.875rem 0 0;border:1px solid var(--border);border-bottom:none">
    <button class="tab-btn active" data-src="">Toutes</button>
  </div>

  <!-- Filters -->
  <div class="filters" style="background:var(--surface);border:1px solid var(--border);border-top:none">
    <input class="input" id="q" placeholder="🔍 Rechercher..." oninput="applyFilter()" style="flex:1;min-width:180px">
    <select class="select" id="period" onchange="applyFilter()">
      <option value="">Toutes les dates</option>
      <option value="week">Cette semaine</option>
      <option value="month">Ce mois</option>
      <option value="future">À venir</option>
    </select>
    <select class="select" id="sort" onchange="applyFilter()">
      <option value="date">Ordre chronologique</option>
      <option value="recent">Ajout récent</option>
    </select>
    <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.8rem;color:var(--muted);cursor:pointer;white-space:nowrap">
      <input type="checkbox" id="only-free" onchange="applyFilter()"> Gratuits
    </label>
    <span id="cnt" class="text-xs text-muted" style="white-space:nowrap"></span>
  </div>

  <!-- Cards -->
  <div style="background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 0.875rem 0.875rem;padding:1.25rem">
    <div class="grid-cards" id="acts-grid">
      <div class="empty"><div class="empty-icon">⏳</div><p>Chargement...</p></div>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<footer><div class="container">LUX-BOT — <a href="index.html">Accueil</a> · <a href="stats.html">Stats</a></div></footer>

<script>
let all = [], filtered = [], activeSrc = '', PAGE = 20, page = 1;

function esc(s) { if (s == null) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
function timeAgo(dt) {
  if (!dt) return '';
  const m = Math.floor((Date.now() - new Date(dt)) / 60000);
  if (m < 60) return `Il y a ${m} min`; if (m < 1440) return `Il y a ${Math.floor(m/60)}h`; return `Il y a ${Math.floor(m/1440)}j`;
}
function formatDate(s) {
  if (!s) return null;
  // Try ISO parse
  const iso = new Date(s);
  if (!isNaN(iso)) {
    const opts = {weekday:'long', day:'numeric', month:'long', year:'numeric'};
    const str = iso.toLocaleDateString('fr-FR', opts);
    const hour = iso.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    const isUTC = s.includes('T') && (s.endsWith('Z') || s.includes('+'));
    return isUTC ? str : str + (s.includes('T') ? ' à ' + hour : '');
  }
  // Already textual (e.g. "15 avril 2026")
  return s;
}
function isPast(dateStr) {
  if (!dateStr) return false;
  const d = new Date(dateStr);
  return !isNaN(d) && d < new Date();
}
function isThisWeek(dateStr) {
  if (!dateStr) return false;
  const d = new Date(dateStr);
  if (isNaN(d)) return false;
  const now = new Date(), day = now.getDay();
  const mon = new Date(now); mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1)); mon.setHours(0,0,0,0);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
  return d >= mon && d <= sun;
}
function isThisMonth(dateStr) {
  if (!dateStr) return false;
  const d = new Date(dateStr);
  if (isNaN(d)) return false;
  const now = new Date();
  return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
}
function srcColor(src) {
  const map = {
    'activites.mamer.lu': '#2dd4bf', 'mamer.lu/agenda': '#38bdf8', 'snj.lu': '#a78bfa',
    'bertrange.lu': '#f97316', 'vdl.lu': '#e879f9', 'kulturfabrik.lu': '#f59e0b', 'eventbrite.lu': '#fb923c'
  };
  return map[src] || '#94a3b8';
}

function render(items) {
  const g = document.getElementById('acts-grid');
  if (!items.length) { g.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>Aucune activité pour ces critères</p></div>'; return; }
  g.innerHTML = items.map(a => {
    const past = isPast(a.date_event);
    const fmtDate = formatDate(a.date_event);
    const color = srcColor(a.source);
    return `<a href="${esc(a.url)}" target="_blank" rel="noopener" style="text-decoration:none">
      <div class="card" style="height:100%;display:flex;flex-direction:column;gap:0.6rem;${past ? 'opacity:0.55' : ''};border-left:3px solid ${color}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem">
          <h3 class="clamp2 font-bold" style="font-size:0.875rem;flex:1">${esc(a.title)}</h3>
          ${a.price === 0 ? '<span class="badge badge-green" style="flex-shrink:0">Gratuit</span>' : a.price ? `<span class="badge badge-amber" style="flex-shrink:0">${a.price}€</span>` : ''}
        </div>
        ${a.description ? `<p class="clamp2 text-xs text-muted">${esc(a.description)}</p>` : ''}
        <div style="display:flex;flex-direction:column;gap:0.3rem;font-size:0.8rem">
          ${fmtDate ? `<div style="display:flex;align-items:center;gap:0.4rem">
            <span>📅</span>
            <span style="color:${past ? 'var(--muted)' : 'var(--accent)'};font-weight:600">${esc(fmtDate)}</span>
            ${past ? '<span class="badge badge-slate" style="font-size:0.65rem">Passé</span>' : ''}
          </div>` : ''}
          ${a.location ? `<div style="color:var(--muted)">📍 ${esc(a.location)}</div>` : ''}
          ${a.age_min && a.age_max ? `<div style="color:var(--muted)">👥 ${a.age_min}–${a.age_max} ans</div>` : ''}
          ${a.organizer ? `<div style="color:var(--muted)">🏛️ ${esc(a.organizer)}</div>` : ''}
        </div>
        <div style="margin-top:auto;padding-top:0.5rem;display:flex;align-items:center;justify-content:space-between">
          <span class="badge" style="background:${color}22;color:${color}">${esc(a.source)}</span>
          <span class="text-xs text-muted">${timeAgo(a.scraped_at)}</span>
        </div>
      </div>
    </a>`;
  }).join('');
}

function renderPagination(total) {
  const pages = Math.ceil(total / PAGE);
  const p = document.getElementById('pagination');
  if (pages <= 1) { p.innerHTML = ''; return; }
  let html = '';
  if (page > 1) html += `<button class="page-btn" onclick="goPage(${page-1})">←</button>`;
  const s = Math.max(1, page-2), e = Math.min(pages, page+2);
  if (s > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button>${s>2?'<span style="padding:0 0.25rem;color:var(--muted)">…</span>':''}`;
  for (let i=s;i<=e;i++) html += `<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  if (e < pages) html += `${e<pages-1?'<span style="padding:0 0.25rem;color:var(--muted)">…</span>':''}<button class="page-btn" onclick="goPage(${pages})">${pages}</button>`;
  if (page < pages) html += `<button class="page-btn" onclick="goPage(${page+1})">→</button>`;
  p.innerHTML = html;
}
function goPage(n) { page = n; window.scrollTo(0,200); const sl = filtered.slice((n-1)*PAGE, n*PAGE); render(sl); renderPagination(filtered.length); }

function applyFilter() {
  page = 1;
  const q = document.getElementById('q').value.toLowerCase();
  const period = document.getElementById('period').value;
  const sort = document.getElementById('sort').value;
  const onlyFree = document.getElementById('only-free').checked;
  const now = new Date();
  const monthEnd = new Date(now.getFullYear(), now.getMonth()+1, 0);

  filtered = all.filter(a =>
    (!activeSrc || a.source === activeSrc) &&
    (!q || (a.title||'').toLowerCase().includes(q) || (a.description||'').toLowerCase().includes(q) || (a.location||'').toLowerCase().includes(q)) &&
    (!onlyFree || a.price === 0) &&
    (period === '' || (period === 'week' && isThisWeek(a.date_event)) ||
     (period === 'month' && isThisMonth(a.date_event)) ||
     (period === 'future' && !isPast(a.date_event)))
  );

  if (sort === 'date') {
    filtered.sort((a,b) => {
      const da = new Date(a.date_event||'9999'), db = new Date(b.date_event||'9999');
      if (isNaN(da) && isNaN(db)) return 0;
      if (isNaN(da)) return 1; if (isNaN(db)) return -1;
      return da - db;
    });
  } else {
    filtered.sort((a,b) => b.id - a.id);
  }

  document.getElementById('cnt').textContent = `${filtered.length} résultat(s)`;
  goPage(1);
}

function setSource(src) {
  activeSrc = src;
  document.querySelectorAll('#source-tabs .tab-btn').forEach(b => b.classList.toggle('active', b.dataset.src === src));
  applyFilter();
}

async function loadData() {
  try {
    const acts = await fetch('data/activites.json').then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
    all = acts;
    const now = new Date();
    const weekEnd = new Date(now); weekEnd.setDate(now.getDate() + 7);

    document.getElementById('st-total').textContent = all.length;
    document.getElementById('st-week').textContent = all.filter(a => { const d = new Date(a.date_event); return !isNaN(d) && d >= now && d <= weekEnd; }).length;
    document.getElementById('st-free').textContent = all.filter(a => a.price === 0).length;
    const sources = [...new Set(all.map(a => a.source).filter(Boolean))];
    document.getElementById('st-src').textContent = sources.length;

    const tabs = document.getElementById('source-tabs');
    sources.forEach(src => {
      const b = document.createElement('button');
      b.className = 'tab-btn'; b.dataset.src = src;
      b.style.cssText = `border-left: 3px solid ${srcColor(src)}`;
      b.textContent = src;
      b.onclick = () => setSource(src);
      tabs.appendChild(b);
    });
    tabs.querySelector('[data-src=""]').onclick = () => setSource('');

    applyFilter();
  } catch(e) {
    const err = document.getElementById('error-msg');
    err.style.display = 'block';
    err.textContent = '⚠️ Impossible de charger activites.json : ' + e.message;
    document.getElementById('acts-grid').innerHTML = '<div class="empty"><div class="empty-icon">❌</div><p>Données non disponibles. Lancez le bot d\'abord.</p></div>';
  }
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
loadData();
</script>
</body>
</html>
