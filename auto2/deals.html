<html lang="fr">

  <meta charset="UTF-8">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
      --border: #30363d; --border2: #3d444e;
      --txt: #e6edf3; --txt2: #8b949e; --txt3: #6e7681;
      --accent: #388bfd; --accent-dim: rgba(56,139,253,.15);
      --green: #3fb950; --green-dim: rgba(63,185,80,.15);
      --amber: #d29922; --amber-dim: rgba(210,153,34,.15);
      --red: #f85149; --red-dim: rgba(248,81,73,.15);
      --gold: #e3b341; --silver: #9a9a9a; --bronze: #c97c37;
      --purple: #bc8cff;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--txt); font-family: 'Barlow', sans-serif; font-size: 14px; margin: 0; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── Navbar ── */
    .navbar { background: var(--surface) !important; border-bottom: 1px solid var(--border); padding: 0 1rem; }
    .navbar-brand { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: .03em; color: var(--txt) !important; }
    .navbar-brand span { color: var(--accent); }
    .navbar-toggler { border: 1px solid var(--border) !important; padding: 4px 8px; }
    .navbar-toggler-icon { filter: invert(1); }
    .navbar-collapse { background: var(--surface); }
    .nav-link { color: var(--txt2) !important; font-size: 13px; font-weight: 500; padding: 12px 14px !important; transition: color .15s; }
    .nav-link:hover { color: var(--txt) !important; }
    .nav-link.active { color: var(--accent) !important; }

    /* ── Stats bar ── */
    #stats-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 0; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--txt2); }
    #stats-bar strong { color: var(--txt); }
    #stats-bar .pipe { color: var(--border2); margin: 0 8px; }

    /* ── Filter panel ── */
    .filter-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; }
    .form-select, .form-check-input {
      background-color: var(--surface2); border: 1px solid var(--border); color: var(--txt);
      font-size: 13px; border-radius: 6px;
    }
    .form-select:focus { box-shadow: 0 0 0 3px var(--accent-dim); border-color: var(--accent); }
    .form-select option { background: var(--surface2); }
    .form-check-input { width: 16px; height: 16px; }
    .form-check-input:checked { background-color: var(--accent); border-color: var(--accent); }
    .form-check-label { color: var(--txt2); font-size: 13px; }

    /* ── Deal cards ── */
    .deal-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; transition: transform .15s, box-shadow .15s, border-color .15s;
      overflow: hidden;
    }
    .deal-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.4); border-color: var(--border2); }
    .deal-card .card-body { padding: 18px; }
    .deal-card.top1 { border-top: 3px solid var(--gold); }
    .deal-card.top2 { border-top: 3px solid var(--silver); }
    .deal-card.top3 { border-top: 3px solid var(--bronze); }
    .deal-card.topn { border-top: 3px solid var(--green); }

    /* ── Rank badge ── */
    .rank-badge { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: .95rem; flex-shrink: 0; }
    .rank-1 { background: var(--gold); color: #000; }
    .rank-2 { background: var(--silver); color: #000; }
    .rank-3 { background: var(--bronze); color: #fff; }
    .rank-n { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }

    /* ── Badge ── */
    .badge-nou { background: var(--green-dim); color: var(--green); border: 1px solid rgba(63,185,80,.3); font-size: 10px; padding: 2px 6px; border-radius: 4px; font-family: 'DM Mono', monospace; }
    .badge-site { background: var(--surface2); color: var(--txt2); border: 1px solid var(--border); font-size: 10px; padding: 2px 6px; border-radius: 4px; font-family: 'DM Mono', monospace; }

    /* ── Car title ── */
    .car-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--txt); text-decoration: none; }
    .car-title:hover { color: var(--accent); }
    .car-subtitle { font-size: 12px; color: var(--txt3); margin-top: 2px; }

    /* ── Stats grid ── */
    .stat-cell { text-align: center; }
    .stat-val { font-family: 'DM Mono', monospace; font-weight: 500; font-size: .95rem; color: var(--txt); }
    .stat-lbl { font-size: 10px; color: var(--txt3); text-transform: uppercase; letter-spacing: .04em; margin-top: 2px; }
    .stat-divider { border-left: 1px solid var(--border); }

    /* ── Prix ── */
    .prix-main { font-family: 'DM Mono', monospace; font-weight: 500; font-size: 1.2rem; color: var(--green); }
    .prix-barre { font-family: 'DM Mono', monospace; font-size: .8rem; color: var(--txt3); text-decoration: line-through; }
    .economie-eur { font-family: 'DM Mono', monospace; font-weight: 500; color: var(--green); font-size: .95rem; }
    .economie-pct { background: var(--green-dim); color: var(--green); border: 1px solid rgba(63,185,80,.3); font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 4px; font-family: 'DM Mono', monospace; }

    /* ── Pct bar ── */
    .pct-bar-track { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
    .pct-bar-fill { height: 100%; border-radius: 2px; background: var(--green); transition: width .3s ease; }
    .bar-label { font-size: 10px; color: var(--txt3); font-family: 'DM Mono', monospace; }

    /* ── Voir btn ── */
    .btn-voir { background: transparent; border: 1px solid var(--border); color: var(--txt2); font-size: 12px; padding: 4px 12px; border-radius: 4px; text-decoration: none; transition: all .15s; }
    .btn-voir:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    /* ── Meta ── */
    .meta-txt { font-size: 12px; color: var(--txt3); }

    /* ── Empty state ── */
    #no-deals { color: var(--txt2); }
    #no-deals h4 { color: var(--txt); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; }

    /* ── Separator ── */
    hr { border-color: var(--border); opacity: 1; }

    @media (max-width: 576px) {
      .stat-divider { border-left: none; border-top: 1px solid var(--border); }
      .prix-main { font-size: 1.05rem; }
    }
  </style>
</head>

<div id="stats-bar">
  <div class="container-fluid d-flex flex-wrap gap-0 justify-content-center align-items-center">
    <span>DEALS <strong id="nb-deals">—</strong></span>
    <span class="pipe">|</span>
    <span>ÉCO MAX <strong id="eco-max">—</strong></span>
    <span class="pipe">|</span>
    <span>SOUS-MARCHÉ MOY. <strong id="pct-moyen">—</strong></span>
    <span class="pipe">|</span>
    <span>MAJ <strong id="last-update">—</strong></span>
  </div>
</div>

<div class="container-fluid mt-3 px-3 px-md-4">

  <!-- Filtre -->
  <div class="filter-panel mb-3">
    <div class="row g-2 align-items-end mb-2">
      <div class="col-md-2 col-6">
        <label class="form-label" style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--txt3);margin-bottom:4px">Marque</label>
        <select id="f-marque" class="form-select form-select-sm" onchange="renderDeals()"><option value="">Toutes</option></select>
      </div>
      <div class="col-md-2 col-6">
        <label class="form-label" style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--txt3);margin-bottom:4px">Modèle</label>
        <select id="f-modele" class="form-select form-select-sm" onchange="renderDeals()"><option value="">Tous</option></select>
      </div>
      <div class="col-md-1 col-6">
        <label class="form-label" style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--txt3);margin-bottom:4px">Prix max €</label>
        <input type="number" id="f-prix-max" class="form-control form-control-sm" placeholder="100 000" style="background:var(--surface2);border:1px solid var(--border);color:var(--txt)" oninput="renderDeals()">
      </div>
      <div class="col-md-1 col-6">
        <label class="form-label" style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--txt3);margin-bottom:4px">Km max</label>
        <input type="number" id="f-km-max" class="form-control form-control-sm" placeholder="200 000" style="background:var(--surface2);border:1px solid var(--border);color:var(--txt)" oninput="renderDeals()">
      </div>
      <div class="col-md-1 col-6">
        <label class="form-label" style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--txt3);margin-bottom:4px">Année min</label>
        <input type="number" id="f-annee-min" class="form-control form-control-sm" placeholder="2015" style="background:var(--surface2);border:1px solid var(--border);color:var(--txt)" oninput="renderDeals()">
      </div>
      <div class="col-md-1 col-6">
        <label class="form-label" style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--txt3);margin-bottom:4px">Pays</label>
        <select id="f-pays" class="form-select form-select-sm" onchange="renderDeals()">
          <option value="">Tous</option>
          <option value="Luxembourg">🇱🇺 LU</option>
          <option value="Allemagne">🇩🇪 DE</option>
          <option value="France">🇫🇷 FR</option>
          <option value="Belgique">🇧🇪 BE</option>
        </select>
      </div>
      <div class="col-md-2 col-6">
        <label class="form-label" style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--txt3);margin-bottom:4px">Seuil économie</label>
        <select id="seuil-pct" class="form-select form-select-sm" onchange="renderDeals()">
          <option value="5">≥ 5% sous marché</option>
          <option value="10" selected>≥ 10% sous marché</option>
          <option value="15">≥ 15% sous marché</option>
          <option value="20">≥ 20% sous marché</option>
          <option value="25">≥ 25% sous marché</option>
        </select>
      </div>
      <div class="col-md-2 col-12 d-flex align-items-end gap-3 flex-wrap">
        <div class="form-check mb-0">
          <input class="form-check-input" type="checkbox" id="hide-suspect" checked onchange="renderDeals()">
          <label class="form-check-label" for="hide-suspect" style="font-size:12px">Masquer suspects</label>
        </div>
        <button class="btn-voir" onclick="resetDealFilters()" style="padding:4px 10px;font-size:11px">↺ Reset</button>
      </div>
    </div>
  </div>

  <!-- Grille deals -->
  <div id="deals-grid" class="row g-3"></div>

  <div id="no-deals" class="text-center py-5 d-none">
    <div style="font-size:3rem;opacity:.3">◈</div>
    <h4 class="mt-3">Aucune bonne affaire détectée</h4>
    <p class="meta-txt">Les données seront disponibles après le premier scraping.</p>
  </div>

</div>

<script src="data/deals.js"></script>
<script src="data/stats.js"></script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});</script>
<script>
  const deals = typeof DEALS !== 'undefined' ? DEALS : [];
  const stats  = typeof STATS !== 'undefined' ? STATS : {};

  document.addEventListener('DOMContentLoaded', () => {
    fillSelectFilters();
    fillStats();
    renderDeals();
  });

  function fillSelectFilters() {
    const marques = [...new Set(deals.map(d => d.marque_norm || d.marque).filter(Boolean))].sort();
    const sel = document.getElementById('f-marque');
    marques.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; sel.appendChild(o); });
    sel.addEventListener('change', () => {
      const modSel = document.getElementById('f-modele');
      modSel.innerHTML = '<option value="">Tous</option>';
      const m = sel.value;
      if (m) {
        const modeles = [...new Set(deals.filter(d => (d.marque_norm||d.marque) === m).map(d => d.modele_norm||d.modele).filter(Boolean))].sort();
        modeles.forEach(mod => { const o = document.createElement('option'); o.value = mod; o.textContent = mod; modSel.appendChild(o); });
      } else {
        const allMods = [...new Set(deals.map(d => d.modele_norm||d.modele).filter(Boolean))].sort();
        allMods.forEach(mod => { const o = document.createElement('option'); o.value = mod; o.textContent = mod; modSel.appendChild(o); });
      }
    });
    // Fill modeles initially
    const allMods = [...new Set(deals.map(d => d.modele_norm||d.modele).filter(Boolean))].sort();
    const modSel = document.getElementById('f-modele');
    allMods.forEach(mod => { const o = document.createElement('option'); o.value = mod; o.textContent = mod; modSel.appendChild(o); });
  }

  function fillStats() {
    const visible = getFilteredDeals();
    document.getElementById('nb-deals').textContent  = visible.length;
    document.getElementById('last-update').textContent = stats.date_calcul ? stats.date_calcul.slice(0,16) : '—';
    if (visible.length > 0) {
      document.getElementById('eco-max').textContent =
        visible[0].economie_eur ? formatPrix(visible[0].economie_eur) : '—';
      const moy = visible.reduce((s, d) => s + (d.economie_pct||0), 0) / visible.length;
      document.getElementById('pct-moyen').textContent = moy.toFixed(1) + '%';
    } else {
      document.getElementById('eco-max').textContent = '—';
      document.getElementById('pct-moyen').textContent = '—';
    }
  }

  function getFilteredDeals() {
    const seuil       = parseFloat(document.getElementById('seuil-pct').value);
    const hideSuspect = document.getElementById('hide-suspect').checked;
    const marque      = document.getElementById('f-marque').value;
    const modele      = document.getElementById('f-modele').value;
    const prixMax     = parseInt(document.getElementById('f-prix-max').value) || Infinity;
    const kmMax       = parseInt(document.getElementById('f-km-max').value) || Infinity;
    const anneeMin    = parseInt(document.getElementById('f-annee-min').value) || 0;
    const pays        = document.getElementById('f-pays').value;
    return deals.filter(d => {
      if (d.economie_pct < seuil) return false;
      if (hideSuspect && d.risk_score && d.risk_score > 70) return false;
      if (marque && (d.marque_norm||d.marque) !== marque) return false;
      if (modele && (d.modele_norm||d.modele) !== modele) return false;
      if (d.prix && d.prix > prixMax) return false;
      if (d.km  && d.km  > kmMax)    return false;
      if (d.annee && d.annee < anneeMin) return false;
      if (pays && (d.pays||'') !== pays) return false;
      return true;
    });
  }

  function resetDealFilters() {
    document.getElementById('f-marque').value = '';
    document.getElementById('f-modele').value = '';
    document.getElementById('f-prix-max').value = '';
    document.getElementById('f-km-max').value = '';
    document.getElementById('f-annee-min').value = '';
    document.getElementById('f-pays').value = '';
    document.getElementById('seuil-pct').value = '10';
    document.getElementById('hide-suspect').checked = true;
    renderDeals();
  }

  function renderDeals() {
    fillStats();
    const visible = getFilteredDeals();
    const grid = document.getElementById('deals-grid');
    const noDeals = document.getElementById('no-deals');

    if (visible.length === 0) {
      grid.innerHTML = '';
      noDeals.classList.remove('d-none');
      return;
    }
    noDeals.classList.add('d-none');
    grid.innerHTML = '';

    visible.forEach((d, i) => {
      const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : 'topn';
      const rankBadgeClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-n';
      const pctWidth = Math.min(100, (d.economie_pct / 40) * 100);
      const today = new Date().toISOString().slice(0,10);
      const isNew = (d.date_premiere_vue||'').slice(0,10) === today;

      const col = document.createElement('div');
      col.className = 'col-md-6 col-xl-4';
      col.innerHTML = `
        <div class="deal-card ${rankClass} h-100">
          <div class="card-body">
            <!-- Top row -->
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div class="rank-badge ${rankBadgeClass}">${i+1}</div>
              <div class="d-flex gap-1 flex-wrap justify-content-end">
                ${isNew ? '<span class="badge-nou">NOUVEAU</span>' : ''}
                <span class="badge-site">${d.site||'—'}</span>
              </div>
            </div>

            <!-- Title -->
            <div class="mb-1">
              <a href="${d.url||'#'}" target="_blank" class="car-title">
                ${d.marque_norm||d.marque||'—'} ${d.modele_norm||d.modele||''}
              </a>
            </div>
            <div class="car-subtitle mb-3">${d.version_norm||d.version||'&nbsp;'}</div>

            <!-- Stats grid -->
            <div class="row g-0 text-center mb-3" style="background:var(--surface2);border-radius:6px;padding:10px 0">
              <div class="col stat-cell">
                <div class="stat-val">${d.annee||'—'}</div>
                <div class="stat-lbl">Année</div>
              </div>
              <div class="col stat-cell stat-divider">
                <div class="stat-val">${d.km ? Math.round(d.km/1000)+'k km' : '—'}</div>
                <div class="stat-lbl">Km</div>
              </div>
              <div class="col stat-cell stat-divider">
                <div class="stat-val">${d.carburant||'—'}</div>
                <div class="stat-lbl">Carbu.</div>
              </div>
            </div>

            <!-- Prix -->
            <div class="d-flex justify-content-between align-items-center mb-1">
              <span class="prix-main">${formatPrix(d.prix)}</span>
              <span class="prix-barre">${d.prix_median_segment ? formatPrix(d.prix_median_segment) : ''}</span>
            </div>

            <!-- Économie -->
            <div class="d-flex justify-content-between align-items-center mb-2">
              <span class="economie-eur">−${formatPrix(d.economie_eur)}</span>
              <span class="economie-pct">${d.economie_pct}% sous marché</span>
            </div>

            <!-- Barre visuelle -->
            <div class="mb-3">
              <div class="d-flex justify-content-between bar-label mb-1">
                <span>0%</span><span>Économie vs segment</span><span>40%+</span>
              </div>
              <div class="pct-bar-track">
                <div class="pct-bar-fill" style="width:${pctWidth}%"></div>
              </div>
            </div>

            <hr class="my-2">

            <!-- Scores + Footer -->
            <div class="d-flex justify-content-between align-items-center mb-2">
              <div class="d-flex gap-2 align-items-center">
                <span style="font-size:11px;color:var(--txt3)">Deal</span>
                ${d.deal_score != null ? `<span style="font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:${d.deal_score>=70?'var(--green)':d.deal_score>=50?'var(--amber)':'var(--txt3)'}">${Math.round(d.deal_score)}</span>` : ''}
                <span style="font-size:11px;color:var(--txt3);margin-left:6px">Négo</span>
                ${d.nego_score != null ? `<span style="font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:${d.nego_score>=70?'var(--green)':d.nego_score>=40?'var(--amber)':'var(--txt3)'}">${Math.round(d.nego_score)}%</span>` : '<span style="color:var(--txt3);font-size:12px">—</span>'}
              </div>
              <span class="meta-txt">${d.nb_jours_visibles ? d.nb_jours_visibles+'j en ligne' : ''}</span>
            </div>
            <div class="d-flex justify-content-between align-items-center">
              <span class="meta-txt">${d.ville||'—'} · ${formatDate(d.date_premiere_vue)}</span>
              <a href="${d.url||'#'}" target="_blank" class="btn-voir">Voir →</a>
            </div>
          </div>
        </div>
      `;
      grid.appendChild(col);
    });
  }

  function formatPrix(p) { return p ? p.toLocaleString('fr') + '\u202f€' : '—'; }

  function formatDate(d) {
    if (!d) return '—';
    const today = new Date().toISOString().slice(0,10);
    const date  = d.slice(0,10);
    if (date === today) return "Aujourd'hui";
    const diff = Math.floor((new Date(today) - new Date(date)) / 86400000);
    return diff === 1 ? 'Hier' : diff < 7 ? `Il y a ${diff}j` : date;
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
